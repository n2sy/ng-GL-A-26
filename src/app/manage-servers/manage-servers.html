
<input type="text" class="form-control" [(ngModel)]="selectedStatus">
<br>
<ul class="list-group">
    
  @for (serv of allServers | filter:selectedStatus; track $index) {
    <li [ngClass]="affecterClasse(serv)" class="list-group-item">
      {{ serv.name | short: 14 }} | {{ serv.type | titlecase | short: 1 }} |
      {{ serv.date_d | date: 'fullDate' | uppercase }}
      <span class="badge text-bg-secondary">{{ serv.status  }} </span>
    </li>
  }
</ul>

<button class="btn btn-info" (click)="addServer()">Add Server</button>
