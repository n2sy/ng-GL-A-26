<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Product Name</th>
            <th>Price</th>
            <th>Selected</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        @for (product of productSer.allProducts(); track $index) {
            <tr>
                <td>{{ product.name }} </td>
                <td>{{ product.price }} </td>
                <td>{{ product.isSelected }} </td>
            </tr>
        }
    </tbody>
</table>
