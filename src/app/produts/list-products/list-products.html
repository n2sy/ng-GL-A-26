<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Product Name</th>
            <th>Price</th>
            <th>Selected</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        @for (product of productSer.allProducts(); track $index) {
            <tr>
                <td>{{ product.id }} </td>
                <td>{{ product.name }} </td>
                <td>{{ product.price }} </td>
                @if(product.isSelected){
                    <td><button (click)="productSer.updateSelectedProduct(product.id)" class="btn btn-success">Selected </button></td>
                } 
                @else {
                    <td><button (click)="productSer.updateSelectedProduct(product.id)" class="btn btn-danger">Not Selected </button></td>
                }
                <td><button (click)="productSer.deleteProduct(product.id)" class="btn btn-outline-danger">Delete</button></td>
            </tr>
        }
    </tbody>
</table>
